apiVersion: v1
kind: Secret
metadata:
  name: {{ include "notification-service.fullname" . }}-secrets
  labels:
    {{- include "notification-service.labels" . | nindent 4 }}
type: Opaque
data:
  sendgrid-api-key: {{ .Values.secrets.sendgridApiKey }}
  firebase-credentials: {{ .Values.secrets.firebaseCredentials }}
  database-url: {{ .Values.secrets.databaseUrl }}
