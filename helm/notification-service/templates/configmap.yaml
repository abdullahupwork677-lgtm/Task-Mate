apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "notification-service.fullname" . }}-config
  labels:
    {{- include "notification-service.labels" . | nindent 4 }}
data:
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.kafka.bootstrapServers | quote }}
  KAFKA_CONSUMER_GROUP: {{ .Values.kafka.consumerGroup | quote }}
  KAFKA_REMINDERS_TOPIC: {{ .Values.kafka.remindersTopic | quote }}
  KAFKA_AUTO_OFFSET_RESET: {{ .Values.kafka.autoOffsetReset | quote }}
  KAFKA_ENABLE_AUTO_COMMIT: {{ .Values.kafka.enableAutoCommit | quote }}
  SENDGRID_FROM_EMAIL: {{ .Values.email.fromEmail | quote }}
  SENDGRID_FROM_NAME: {{ .Values.email.fromName | quote }}
  FIREBASE_ENABLED: {{ .Values.firebase.enabled | quote }}
  IN_APP_RETENTION_DAYS: {{ .Values.inAppNotifications.retentionDays | quote }}
  LOG_LEVEL: {{ .Values.app.logLevel | quote }}
  ENVIRONMENT: {{ .Values.app.environment | quote }}
  PORT: {{ .Values.app.port | quote }}
  HEALTH_CHECK_KAFKA_TIMEOUT: {{ .Values.healthCheck.kafkaTimeout | quote }}
  HEALTH_CHECK_DB_TIMEOUT: {{ .Values.healthCheck.dbTimeout | quote }}
