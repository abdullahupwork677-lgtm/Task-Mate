apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  labels:
    app: notification-service
    component: notifications
data:
  # Kafka Configuration
  KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
  KAFKA_CONSUMER_GROUP: "notification-service-group"
  KAFKA_REMINDERS_TOPIC: "reminders"
  KAFKA_AUTO_OFFSET_RESET: "earliest"
  KAFKA_ENABLE_AUTO_COMMIT: "true"

  # Email Configuration
  SENDGRID_FROM_EMAIL: "noreply@todoapp.com"
  SENDGRID_FROM_NAME: "Todo App Reminders"

  # Firebase Configuration
  FIREBASE_ENABLED: "true"

  # In-App Notification Configuration
  IN_APP_RETENTION_DAYS: "30"

  # Application Configuration
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  PORT: "8080"

  # Health Check Configuration
  HEALTH_CHECK_KAFKA_TIMEOUT: "5"
  HEALTH_CHECK_DB_TIMEOUT: "5"
