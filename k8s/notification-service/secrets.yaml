apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secrets
  labels:
    app: notification-service
    component: notifications
type: Opaque
data:
  # Base64 encoded secrets
  # To encode a secret: echo -n "your-secret-value" | base64
  # To decode a secret: echo "base64-string" | base64 -d

  # SendGrid API Key
  # Example: echo -n "SG.your-sendgrid-api-key" | base64
  sendgrid-api-key: <BASE64_ENCODED_SENDGRID_API_KEY>

  # Firebase Service Account JSON (base64 encoded)
  # Example: cat firebase-service-account.json | base64 -w 0
  firebase-credentials: <BASE64_ENCODED_FIREBASE_CREDENTIALS_JSON>

  # Database URL (PostgreSQL connection string)
  # Example: echo -n "postgresql://user:password@host:5432/database" | base64
  database-url: <BASE64_ENCODED_DATABASE_URL>
