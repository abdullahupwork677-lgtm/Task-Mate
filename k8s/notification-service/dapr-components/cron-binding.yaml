apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reminder-check-cron
  namespace: default
spec:
  type: bindings.cron
  version: v1
  metadata:
  # T169: 5-minute schedule
  - name: schedule
    value: "@every 5m"  # Every 5 minutes

  # Optional: Use cron expression instead
  # value: "*/5 * * * *"  # Every 5 minutes (cron format)

  # Optional: Timezone (default: UTC)
  # - name: timezone
  #   value: "America/New_York"

  # Optional: Direction (input bindings only)
  - name: direction
    value: "input"
