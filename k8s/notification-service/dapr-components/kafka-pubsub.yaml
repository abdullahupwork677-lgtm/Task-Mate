apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kafka-pubsub
  namespace: default
spec:
  type: pubsub.kafka
  version: v1
  metadata:
  # T170: Kafka Configuration
  - name: brokers
    value: "redpanda:9092"

  # Consumer Group ID
  - name: consumerGroup
    value: "notification-service-group"

  # Authentication (if required)
  # - name: authType
  #   value: "password"
  # - name: saslUsername
  #   secretKeyRef:
  #     name: kafka-secrets
  #     key: username
  # - name: saslPassword
  #   secretKeyRef:
  #     name: kafka-secrets
  #     key: password

  # Consumer Configuration
  - name: autoOffsetReset
    value: "earliest"

  - name: enableAutoCommit
    value: "true"

  - name: sessionTimeout
    value: "30000"  # 30 seconds

  # Producer Configuration
  - name: maxMessageBytes
    value: "1048576"  # 1MB

  - name: requiredAcks
    value: "1"  # Wait for leader acknowledgment

  # Topic Configuration (handled by application, not Dapr)
  # Topics: reminders, reminders.dlq

  # Optional: TLS Configuration
  # - name: enableTLS
  #   value: "false"
  # - name: skipVerify
  #   value: "false"

  # Optional: Kafka version
  # - name: version
  #   value: "2.8.0"
