apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kubernetes-secrets
  namespace: default
spec:
  type: secretstores.kubernetes
  version: v1
  metadata:
  # T171: Use Kubernetes native secrets
  # No additional configuration needed for Kubernetes secrets

  # Optional: Namespace scope (default: component namespace)
  # - name: namespace
  #   value: "default"

  # Optional: Default secret (not recommended)
  # - name: defaultNamespace
  #   value: "default"

# Usage in application:
# Dapr will automatically reference Kubernetes secrets like:
# - secretKeyRef:
#     name: notification-service-secrets
#     key: sendgrid-api-key
#
# Dapr secret format:
# secretstore://kubernetes-secrets/notification-service-secrets/sendgrid-api-key
