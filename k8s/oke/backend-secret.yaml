apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: todo-app
type: Opaque
stringData:
  # IMPORTANT: Replace these with your actual values before deploying
  # Do NOT commit real secrets to git

  # Database connection string (Neon PostgreSQL)
  DATABASE_URL: "REPLACE_ME_DATABASE_URL"

  # JWT Secret (32 characters)
  BETTER_AUTH_SECRET: "REPLACE_ME_JWT_SECRET"

  # OpenAI API Key
  OPENAI_API_KEY: "REPLACE_ME_OPENAI_API_KEY"
